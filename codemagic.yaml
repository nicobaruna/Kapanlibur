workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1 # Atau linux untuk build Android saja agar lebih hemat
    environment:
      node: latest
      ruby: 2.7.8
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android APK
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - user@example.com

  react-native-ios:
    name: React Native iOS Build
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
          cd ios && pod install
      - name: Build iOS (.ipa)
        script: |
          xcode-project build-ipa --workspace ios/YourProject.xcworkspace --scheme YourScheme
    artifacts:
      - build/ios/ipa/*.ipa

