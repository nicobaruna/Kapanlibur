name: CI/CD - Build, Test & Report

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_appium:
        description: 'Jalankan Appium tests'
        required: false
        default: 'true'
        type: boolean

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  APPIUM_VERSION: '2.5.0'

# =====================================================================
# JOBS
# =====================================================================
jobs:

  # -------------------------------------------------------------------
  # JOB 1: LINT & UNIT TEST
  # -------------------------------------------------------------------
  lint-and-unit-test:
    name: Lint & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0
        continue-on-error: true

      - name: Run unit tests
        run: npm test -- --passWithNoTests --ci --coverage
        env:
          CI: true

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: coverage/
          retention-days: 14

  # -------------------------------------------------------------------
  # JOB 2: BUILD APK via EAS
  # -------------------------------------------------------------------
  build:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest
    needs: lint-and-unit-test
    outputs:
      apk_artifact: ${{ steps.set-output.outputs.apk_artifact }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Setup Expo credentials
        run: |
          mkdir -p ~/.expo
          echo '{"expo":{"token":"${{ secrets.EXPO_TOKEN }}"}}' > ~/.expo/state.json

      - name: Setup Google Services
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      # Build APK via EAS (cloud build) - menggunakan profile preview
      - name: Build APK via EAS Cloud
        id: eas-build
        run: |
          BUILD_URL=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            --no-wait \
            2>/dev/null | grep '"url"' | head -1 | sed 's/.*"url": "\(.*\)".*/\1/')
          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV
          echo "EAS build started. URL: $BUILD_URL"

          # Poll untuk tunggu build selesai (max 30 menit)
          echo "Menunggu build selesai..."
          for i in $(seq 1 60); do
            STATUS=$(eas build:list --platform android --limit 1 --json 2>/dev/null | python3 -c "import json,sys; data=json.load(sys.stdin); print(data[0]['status'] if data else 'UNKNOWN')" 2>/dev/null || echo "CHECKING")
            echo "Status ($i/60): $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then
              break
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build gagal dengan status: $STATUS"
              exit 1
            fi
            sleep 30
          done
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: false

      # Unduh APK dari EAS
      - name: Download APK from EAS
        run: |
          mkdir -p build-output
          eas build:download \
            --platform android \
            --output build-output/app-release.apk \
            2>/dev/null || {
              # Fallback: download via URL jika command tersedia
              echo "Mencoba download via URL..."
              APK_URL=$(eas build:list --platform android --limit 1 --json 2>/dev/null | \
                python3 -c "import json,sys; data=json.load(sys.stdin); print(data[0].get('artifacts',{}).get('buildUrl',''))" 2>/dev/null)
              if [ -n "$APK_URL" ]; then
                curl -L "$APK_URL" -o build-output/app-release.apk
              fi
            }
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Verify APK exists
        run: |
          if [ ! -f build-output/app-release.apk ]; then
            echo "ERROR: APK tidak ditemukan!"
            exit 1
          fi
          ls -lh build-output/
          echo "APK size: $(du -sh build-output/app-release.apk | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kapanlibur-apk
          path: build-output/app-release.apk
          retention-days: 7

      - name: Set output
        id: set-output
        run: echo "apk_artifact=kapanlibur-apk" >> $GITHUB_OUTPUT

  # -------------------------------------------------------------------
  # JOB 3: APPIUM E2E TESTS
  # -------------------------------------------------------------------
  appium-tests:
    name: Appium E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.run_appium != 'false'

    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - name: "Login & Onboarding"
            specs: "login,onboarding"
          - name: "Dashboard & Kalender"
            specs: "dashboard,calendar"
          - name: "Long Weekend & Share"
            specs: "longweekend,share"
          - name: "Financial & Profile"
            specs: "financial,profile"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: kapanlibur-apk
          path: build-output/

      - name: Setup Android SDK & Emulator
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --name "Pixel6_API33" \
            --package "system-images;android-33;google_apis;x86_64" \
            --device "pixel_6" \
            --force

      - name: Start Emulator
        run: |
          $ANDROID_HOME/emulator/emulator \
            -avd Pixel6_API33 \
            -no-snapshot-load \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -skin 1080x2400 &

          echo "Menunggu emulator ready..."
          $ANDROID_HOME/platform-tools/adb wait-for-device
          timeout 120 bash -c 'until $ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed 2>/dev/null | grep -q 1; do sleep 3; done'
          echo "Emulator siap!"

          $ANDROID_HOME/platform-tools/adb shell settings put global window_animation_scale 0
          $ANDROID_HOME/platform-tools/adb shell settings put global transition_animation_scale 0
          $ANDROID_HOME/platform-tools/adb shell settings put global animator_duration_scale 0

      - name: Install Appium dependencies
        working-directory: appium
        run: |
          npm ci
          npx appium driver install uiautomator2

      - name: Start Appium server
        run: |
          npx appium --port 4723 --log appium.log &
          echo "Menunggu Appium ready..."
          timeout 30 bash -c 'until curl -s http://localhost:4723/status | grep -q "ready"; do sleep 2; done'
          echo "Appium server siap!"

      - name: Run Appium tests - ${{ matrix.test-suite.name }}
        working-directory: appium
        id: run-tests
        run: |
          mkdir -p screenshots allure-results

          # Build spec list dari matrix
          SPECS=""
          IFS=',' read -ra SUITE <<< "${{ matrix.test-suite.specs }}"
          for spec in "${SUITE[@]}"; do
            SPECS="$SPECS ./tests/${spec}.test.js"
          done

          APK_PATH="$(pwd)/../build-output/app-release.apk" \
          DEVICE_NAME="emulator-5554" \
          npx wdio run wdio.conf.js --spec $SPECS
        env:
          CI: true
        continue-on-error: true

      - name: Capture emulator screenshot on failure
        if: steps.run-tests.outcome == 'failure'
        run: |
          $ANDROID_HOME/platform-tools/adb shell screencap /sdcard/failure.png
          $ANDROID_HOME/platform-tools/adb pull /sdcard/failure.png appium/screenshots/emulator-failure.png || true

      - name: Upload Appium test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-results-${{ matrix.test-suite.specs }}
          path: |
            appium/allure-results/
            appium/screenshots/
            appium.log
          retention-days: 14

      - name: Stop Emulator
        if: always()
        run: |
          $ANDROID_HOME/platform-tools/adb emu kill || true

  # -------------------------------------------------------------------
  # JOB 4: GENERATE ALLURE REPORT
  # -------------------------------------------------------------------
  generate-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: appium-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all Appium results
        uses: actions/download-artifact@v4
        with:
          pattern: appium-results-*
          path: all-results/
          merge-multiple: false

      - name: Merge Allure results
        run: |
          mkdir -p merged-allure-results
          find all-results -name "*.json" -o -name "*.xml" -o -name "*.png" | while read f; do
            cp "$f" merged-allure-results/ 2>/dev/null || true
          done
          echo "Total result files: $(ls merged-allure-results/ | wc -l)"

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure HTML Report
        run: |
          allure generate merged-allure-results --clean -o allure-report
          echo "Report generated!"

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: allure-report/
          retention-days: 30

      - name: Publish Report to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: test-reports/${{ github.run_number }}

      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Hitung summary dari allure results
            const resultsDir = 'merged-allure-results';
            let passed = 0, failed = 0, skipped = 0;
            try {
              const files = fs.readdirSync(resultsDir).filter(f => f.endsWith('-result.json'));
              files.forEach(file => {
                const data = JSON.parse(fs.readFileSync(`${resultsDir}/${file}`, 'utf8'));
                if (data.status === 'passed') passed++;
                else if (data.status === 'failed') failed++;
                else if (data.status === 'skipped') skipped++;
              });
            } catch(e) {
              console.log('Tidak bisa baca allure results:', e.message);
            }

            const total = passed + failed + skipped;
            const successRate = total > 0 ? Math.round((passed / total) * 100) : 0;
            const emoji = failed === 0 ? '✅' : failed < 3 ? '⚠️' : '❌';

            const body = `## ${emoji} Appium Test Results

            | Metric | Value |
            |--------|-------|
            | Total Tests | ${total} |
            | Passed | ${passed} ✅ |
            | Failed | ${failed} ❌ |
            | Skipped | ${skipped} ⏭️ |
            | Success Rate | ${successRate}% |

            **Build:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            > Allure report tersedia di artifacts tab.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # -------------------------------------------------------------------
  # JOB 5: NOTIFY (SLACK/EMAIL - OPTIONAL)
  # -------------------------------------------------------------------
  notify:
    name: Notify Pipeline Result
    runs-on: ubuntu-latest
    needs: [lint-and-unit-test, build, appium-tests, generate-report]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Determine overall status
        id: status
        run: |
          LINT="${{ needs.lint-and-unit-test.result }}"
          BUILD="${{ needs.build.result }}"
          TESTS="${{ needs.appium-tests.result }}"

          if [ "$BUILD" = "failure" ]; then
            echo "status=FAILED (Build gagal)" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          elif [ "$TESTS" = "failure" ]; then
            echo "status=FAILED (Appium tests gagal)" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          elif [ "$LINT" = "failure" ]; then
            echo "status=WARNING (Lint issues)" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          else
            echo "status=SUCCESS" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "*Kapanlibur CI/CD* - ${{ steps.status.outputs.status }}",
              "attachments": [{
                "color": "${{ steps.status.outputs.color }}",
                "fields": [
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Run", "value": "#${{ github.run_number }}", "short": true},
                  {"title": "Commit", "value": "${{ github.sha }}", "short": false},
                  {"title": "Report", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
